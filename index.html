<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Are You In A Toxic Relationship? | Test</title>
    <style>
        body { font-family: Arial; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 10px; }
        button { background: #ff4757; color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 5px; font-size: 18px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Toxic Relationship Test</h1>
        <p>Answer 15 quick questions to see your relationship score.</p>
        <div id="quiz">
            <h3 id="question">Does your partner constantly check your phone?</h3>
            <button onclick="nextQuestion()">YES</button>
            <button onclick="nextQuestion()">NO</button>
        </div>
    </div>
    <script>
        let q = 1;
        function nextQuestion() {
            q++;
            if(q <= 15) {
                document.getElementById('question').innerText = "Question " + q + ": Do you feel anxious when they are around?";
            } else {
                window.location.href = "BURAYA_ADSTERRA_LINKINI_YAPISTIR";
            }
        }
    </script>
</body>
</html>
